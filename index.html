<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registration Form</title>
</head>
<body>
    <div class="container">
        <form id="registrationForm" onsubmit="return validateForm()" action="confirmation.html" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Name" name="username" required>
        <label for="email">Email:</label>
        <input type="text" id="email" placeholder="Email" name="email" required>
        <label for="password">Password:</label>
        <input type="text" id="password" placeholder="Password" name="password" required>
        <button type="submit">Submit</button>
    </form>
    </div>
    <script src="script.js">     
    </script>
</body>
</html>
